<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soline Login 💎</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div id="particles"></div>

    <div class="login-container">
        <div class="login-card" id="card3d">
            
            <i class="fas fa-gem logo-icon"></i>
            <h2>BOT SOLINE</h2>
            
            <form action="/login" method="POST">
                
                <div class="input-group">
                    <input type="text" name="username" placeholder="Usuário" required autocomplete="off">
                    <i class="fas fa-user"></i>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Senha" required>
                    <i class="fas fa-lock"></i>
                </div>

                <button type="submit">ACESSAR PAINEL</button>
                
                <div id="error-msg" class="error">
                    <i class="fas fa-exclamation-circle"></i> Credenciais Inválidas
                </div>

                <div class="footer">
                    Auth System v2.0 • Soline Joias
                </div>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
