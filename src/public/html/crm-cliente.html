<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
		<title>Cliente • Soline Sales OS</title>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
			rel="stylesheet" />
		<link
			href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap"
			rel="stylesheet" />
		<link rel="stylesheet" href="/css/dashboard.css?v=20260418c" />
		<link rel="stylesheet" href="/css/dashboard-shell.css?v=20260418c" />
		<link rel="stylesheet" href="/css/crm-page.css?v=20260418c" />
	</head>
	<body class="crm-page-body crm-client-page">
		<header class="crm-page-header">
			<div class="crm-page-header-inner">
				<div class="crm-page-brand">
					<div class="crm-page-brand-icon"><i class="fas fa-user"></i></div>
					<div>
						<div id="cliente-page-title" class="crm-page-title">Cliente</div>
						<div id="cliente-page-subtitle" class="crm-page-subtitle">
							Carregando informações...
						</div>
					</div>
				</div>
				<div class="crm-page-actions">
					<button
						class="crm-back-btn"
						id="crmBackBtn"
						type="button"
						aria-label="Voltar">
						<i class="fas fa-arrow-left"></i>
					</button>
					<button
						id="crm-theme-btn"
						class="logout-btn btn-top-action btn-top-neutral"
						type="button"
						title="Alternar tema">
						<i class="fas fa-moon" id="crm-theme-icon"></i>
						<span>Tema</span>
					</button>
					<a
						href="/crm"
						class="logout-btn btn-top-action btn-top-neutral"
						title="Voltar ao CRM">
						<i class="fas fa-arrow-left"></i>
						<span>CRM</span>
					</a>
					<a
						href="/"
						class="logout-btn btn-top-action btn-top-green"
						title="Voltar ao painel">
						<i class="fas fa-house"></i>
						<span>Painel</span>
					</a>
				</div>
			</div>
		</header>

		<main class="crm-page-wrap">
			<section class="crm-client-shell compact-shell">
				<section class="card crm-client-hero compact-hero">
					<div class="crm-client-hero-main">
						<div class="crm-client-avatar"><i class="fas fa-user"></i></div>
						<div class="crm-client-hero-copy">
							<h1 id="detalhe-cliente-nome">Cliente</h1>
							<p id="detalhe-cliente-info">Carregando...</p>
						</div>
					</div>
					<div class="crm-client-hero-actions">
						<button
							id="btn-open-sale-form"
							class="crm-primary-btn"
							type="button">
							<i class="fas fa-bag-shopping"></i>
							<span>Novo pedido</span>
						</button>
					</div>
				</section>

				<section id="crm-detail-summary" class="crm-summary-grid"></section>

				<section class="card crm-sales-panel compact-sales-panel">
					<div class="crm-block-head crm-block-head-tight">
						<div>
							<h2>Pedidos e pagamentos</h2>
							<p>Histórico completo do cliente.</p>
						</div>
					</div>
					<div id="crm-sales-list" class="crm-sales-list crm-sales-list-page">
						<div class="crm-empty-state compact">
							<i class="fas fa-spinner fa-spin"></i>
							<span>Carregando histórico...</span>
						</div>
					</div>
				</section>
			</section>
		</main>

		<script src="/js/crm-cliente.js?v=20260418c"></script>
	</body>
</html>
